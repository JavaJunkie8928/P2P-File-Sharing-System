<!DOCTYPE html>
<html>
<head>
    <title>File Transfer Sender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <script src="https://kit.fontawesome.com/4bd5bb1b54.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="{% static 'style.css' %}">
    <link href="https://fonts.googleapis.com/css?family=Material+Icons|Material+Icons+Outlined" rel="stylesheet">
</head>
<body>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    <!-- Sender UI -->
    <nav class="navbar navbar-light bg-light">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">
            <img
              src="{% static 'img/logo.svg' %}"
              class="me-2"
              height="100"
              alt="MDB Logo"
              loading="lazy"
            />
          
          </a>
          <div class="d-flex gap-5">
            <ul class="navbar-nav flex-row gap-5 fs-4">
                <li class="nav-item">
                  <a class="nav-link active" aria-current="page" href="#">Home</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="{% url 'index'  %}">Send File</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="{% url 'download' %}">Receive File</a>
                </li>
                <li class="nav-item">
                  <a class="nav-link" href="#">About Us</a>
                </li>
              </ul>
        
        </div>
          <div></div>
        </div>
      </nav>

      


      <h1 class="text-center fw-bold mt-5" style="color: wheat;"> File Transfer P2P </h1>
     
     
      <h2 class="text-center fw-bold mt-5" style="color: wheat;"> Receive File </h2>



      <div class="d-flex justify-content-center align-items-center mt-5">
        <div class="upload-files-container">
        
            <div class="p-3 fs-3 fw-bold">Receive</div>
        
            <div class="my-3 w-100 ">
                <div class="d-flex justify-content-between align-items-center w-100"> 
                    <input type="text" id="otpInput" class="form-control px-3 py-3" placeholder="Input Key" style="background-color: #f1f1f1;" required>
                </div>
            
             </div>
             
             <span class="cannot-upload-message"> <span class="material-icons-outlined">error</span> Please select a file first <span class="material-icons-outlined cancel-alert-button">cancel</span> </span>
             <div class="file-block">
                 <div class="file-info"> <span class="material-icons-outlined file-icon">description</span> <span class="file-name"> </span> | <span class="file-size">  </span> </div>
                 
                 <div class="progress-bar"> </div>
                </div>
                <button type="button" onclick="submitOTP()"  class="upload-button"> Download  <i class="mx-2 fa-solid fa-download"></i>  </button>
        </div>

      </div>

</body>
