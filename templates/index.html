      <h1 class="text-center fw-bold mt-5" style="color: wheat;"> File Transfer P2P </h1>
     
     
      <h2 class="text-center fw-bold mt-5" style="color: wheat;"> Send File </h2>



      <div class="d-flex justify-content-center align-items-center mt-5">
        <div class="upload-files-container">
            <p id="status"></p>
          <div class="drag-file-area">
            <span class="material-icons-outlined upload-icon"> file_upload </span>
            <h3 class="dynamic-message"> Drag & drop any file here </h3>
            
            <label class="label" style="display: block;"> or <span class="browse-files"> <input type="file" class="default-file-input" id="fileInput"/> <span class="browse-files-text">browse file</span> <span>from device</span> </span> </label>
          </div>
          <span class="cannot-upload-message"> <span class="material-icons-outlined">error</span> Please select a file first <span class="material-icons-outlined cancel-alert-button">cancel</span> </span>
          <div class="file-block">
            <div class="file-info"> <span class="material-icons-outlined file-icon">description</span> <span class="file-name"> </span> | <span class="file-size">  </span> </div>
            <span class="material-icons remove-file-icon">delete</span>
            <div class="progress-bar"> </div>
          </div>
          <div id="otp">
           <!-- Otp will generate here -->
 
         </div>
          <button type="button"  class="upload-button"> Send  <i class="mx-2 fa-solid fa-paper-plane"></i>  </button>
        </div>

    </div>
